<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>zicro · web</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0c12; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; outline: none; }
  #err { position: fixed; inset: 0; display: none; place-content: center; color: #f78; font: 14px monospace; padding: 2rem; white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="c" tabindex="0"></canvas>
<div id="err"></div>
<script type="module">
// zicro on the web: instantiate the wasm, drive requestAnimationFrame, blit the module's
// RGBA buffer into the canvas with putImageData, and forward DOM pointer/wheel/keyboard
// events into the widget InputQueue. Same immediate-mode toolkit as the native app.
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: false });
const errEl = document.getElementById("err");
const fail = (m) => { errEl.style.display = "grid"; errEl.textContent = "zicro web error:\n" + m; };

let x, mem;
try {
  const { instance } = await WebAssembly.instantiateStreaming(fetch("zicro.wasm"), { env: {} });
  x = instance.exports; mem = x.memory;
} catch (e) { fail(String(e)); throw e; }

function resize() {
  const w = Math.max(1, window.innerWidth | 0), h = Math.max(1, window.innerHeight | 0);
  canvas.width = w; canvas.height = h;
  x.zicroResize(w, h);
}
window.addEventListener("resize", resize);
resize();
canvas.focus();

// --- pointer ---
const pos = (e) => { const r = canvas.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; };
canvas.addEventListener("pointermove", (e) => { const [px, py] = pos(e); x.zicroPointerMove(px, py); });
canvas.addEventListener("pointerdown", (e) => { canvas.setPointerCapture(e.pointerId); canvas.focus(); const [px, py] = pos(e); x.zicroPointerMove(px, py); x.zicroPointerButton(1); });
canvas.addEventListener("pointerup",   (e) => { const [px, py] = pos(e); x.zicroPointerMove(px, py); x.zicroPointerButton(0); });
canvas.addEventListener("wheel", (e) => { e.preventDefault(); x.zicroScroll(-e.deltaY); }, { passive: false });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());

// --- keyboard: printable chars → text events, editing/navigation keys → evdev codes ---
const EVDEV = {
  Backspace: 14, Tab: 15, Enter: 28, Escape: 1, Delete: 111,
  ArrowLeft: 105, ArrowRight: 106, ArrowUp: 103, ArrowDown: 108, Home: 102, End: 107,
};
canvas.addEventListener("keydown", (e) => {
  const code = EVDEV[e.key];
  if (code !== undefined) { e.preventDefault(); x.zicroKey(code, 1); return; }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    x.zicroText(e.key.codePointAt(0));
  }
});
canvas.addEventListener("keyup", (e) => {
  const code = EVDEV[e.key];
  if (code !== undefined) x.zicroKey(code, 0);
});

function frame(tMs) {
  x.zicroFrame(tMs);
  const w = x.zicroWidth(), h = x.zicroHeight();
  const bytes = new Uint8ClampedArray(mem.buffer, x.zicroPixels(), w * h * 4);
  ctx.putImageData(new ImageData(bytes, w, h), 0, 0);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
